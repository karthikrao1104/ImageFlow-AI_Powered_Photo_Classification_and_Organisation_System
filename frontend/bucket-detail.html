<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karthik – Album Detail · FaceVault</title>
  <meta name="description" content="View all photos of Karthik in your FaceVault AI-organized album." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .bucket-hero { padding:40px 0 32px; border-bottom:1px solid var(--border); margin-bottom:32px; }
    .bucket-hero-inner { display:flex; align-items:flex-start; gap:28px; flex-wrap:wrap; }
    .bucket-avatar-wrap { position:relative; }
    .bucket-avatar { width:100px; height:100px; border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:3rem; background:linear-gradient(135deg,#7c3aed,#a855f7); box-shadow:0 0 40px rgba(124,58,237,0.4); }
    .bucket-info { flex:1; }
    .breadcrumb { display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--text-muted); margin-bottom:12px; }
    .breadcrumb a { color:var(--text-muted); text-decoration:none; } .breadcrumb a:hover { color:var(--text-primary); }
    .bucket-name-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .bucket-name { font-size:2.2rem; font-weight:800; }
    .edit-name-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:6px 10px; cursor:pointer; color:var(--text-muted); transition:all 0.2s; }
    .edit-name-btn:hover { color:var(--text-primary); border-color:var(--border-accent); }
    .bucket-meta { display:flex; gap:20px; flex-wrap:wrap; }
    .meta-item { display:flex; align-items:center; gap:6px; color:var(--text-secondary); font-size:0.88rem; }
    .bucket-actions-row { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
    .gallery-controls { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .gallery-controls h2 { font-size:1.1rem; font-weight:700; }
    .select-all-btn { background:none; border:1px solid var(--border); border-radius:8px; padding:7px 14px; color:var(--text-secondary); cursor:pointer; font-size:0.85rem; font-family:inherit; transition:all 0.2s; }
    .select-all-btn:hover { border-color:var(--border-accent); color:var(--text-primary); }
    .photo-grid-large { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
    .photo-cell { aspect-ratio:1; border-radius:10px; overflow:hidden; position:relative; cursor:pointer; background:linear-gradient(135deg,var(--bg-secondary),#1e1b4b); display:flex; align-items:center; justify-content:center; font-size:2rem; border:1px solid var(--border); transition:all 0.2s; }
    .photo-cell:hover { border-color:var(--accent); transform:scale(1.02); }
    .photo-cell.selected { border:2px solid var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .photo-cell .check { position:absolute; top:8px; left:8px; width:22px; height:22px; border-radius:50%; background:var(--accent); display:none; align-items:center; justify-content:center; font-size:0.7rem; color:#fff; z-index:2; }
    .photo-cell.selected .check { display:flex; }
    .photo-cell .photo-date { position:absolute; bottom:6px; left:6px; font-size:0.65rem; color:rgba(255,255,255,0.6); background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px; }
    .selection-bar { position:fixed; bottom:0; left:0; right:0; padding:16px 32px; background:var(--bg-secondary); border-top:1px solid var(--border-accent); display:flex; align-items:center; justify-content:space-between; z-index:500; transform:translateY(100%); transition:transform 0.3s; backdrop-filter:blur(20px); }
    .selection-bar.visible { transform:translateY(0); }
    .sel-count { font-weight:700; }
    .sel-actions { display:flex; gap:10px; }
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:3000; display:none; align-items:center; justify-content:center; }
    .lightbox.open { display:flex; }
    .lb-img { max-width:90vw; max-height:85vh; object-fit:contain; border-radius:12px; font-size:6rem; display:flex; align-items:center; justify-content:center; }
    .lb-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:#fff; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem; }
    .lb-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); border:none; color:#fff; width:44px; height:44px; border-radius:50%; cursor:pointer; font-size:1.2rem; transition:background 0.2s; }
    .lb-nav:hover { background:rgba(255,255,255,0.2); }
    .lb-prev { left:20px; }
    .lb-next { right:20px; }
    .lb-info { position:absolute; bottom:20px; color:rgba(255,255,255,0.7); font-size:0.85rem; }
    .merge-section { margin-top:40px; padding-top:32px; border-top:1px solid var(--border); }
    @media(max-width:600px) { .photo-grid-large { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); } .bucket-avatar { width:72px; height:72px; font-size:2rem; } .bucket-name { font-size:1.6rem; } }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo"><div class="logo-icon">🔍</div>FaceVault</a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="upload.html" class="nav-link">Upload</a>
      <a href="results.html" class="nav-link active">Albums</a>
      <a href="search.html" class="nav-link">Search</a>
      <div class="nav-avatar">K</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <!-- HERO -->
      <div class="bucket-hero fade-up">
        <div class="bucket-hero-inner">
          <div class="bucket-avatar-wrap">
            <div class="bucket-avatar">👤</div>
          </div>
          <div class="bucket-info">
            <div class="breadcrumb">
              <a href="results.html">Albums</a> / <span>Karthik</span>
            </div>
            <div class="bucket-name-row">
              <h1 class="bucket-name" id="personName">Karthik</h1>
              <button class="edit-name-btn" onclick="toggleRename()" id="editBtn">✏️ Rename</button>
            </div>
            <div id="renameRow" style="display:none;margin-bottom:12px;">
              <input type="text" class="form-input" id="nameInput" value="Karthik" style="max-width:300px;display:inline-block;" />
              <button class="btn btn-primary btn-sm" style="margin-left:8px;" onclick="saveName()">Save</button>
              <button class="btn btn-secondary btn-sm" style="margin-left:6px;" onclick="cancelRename()">Cancel</button>
            </div>
            <div class="bucket-meta">
              <div class="meta-item">📸 <strong>125</strong> photos</div>
              <div class="meta-item">📅 Added Jun 2026</div>
              <div class="meta-item">💾 <strong>340 MB</strong> storage</div>
              <div class="meta-item">🔍 Person_1</div>
            </div>
            <div class="bucket-actions-row">
              <button class="btn btn-primary btn-sm" onclick="downloadBucket()">📥 Download ZIP</button>
              <button class="btn btn-secondary btn-sm" onclick="openMerge()">🔀 Merge Bucket</button>
              <button class="btn btn-secondary btn-sm" onclick="rerunClustering()">🔄 Re-cluster</button>
              <button class="btn btn-danger btn-sm" onclick="deleteBucket()">🗑 Delete</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PHOTO GALLERY -->
      <div class="gallery-controls fade-up">
        <h2>All Photos <span style="color:var(--text-muted);font-weight:400;" id="photoCount">(125 photos)</span></h2>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="select-all-btn" onclick="toggleSelectAll()" id="selAllBtn">☐ Select All</button>
          <select class="sort-select" style="padding:7px 12px;font-size:0.85rem;" onchange="sortPhotos(this.value)">
            <option>Newest First</option>
            <option>Oldest First</option>
            <option>By Confidence</option>
          </select>
        </div>
      </div>

      <div class="photo-grid-large fade-up fade-up-1" id="photoGrid"></div>

      <!-- MERGE SECTION -->
      <div class="merge-section fade-up">
        <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:16px;">📤 Move Photos to Another Album</h2>
        <p style="color:var(--text-secondary);font-size:0.88rem;margin-bottom:16px;">
          Select photos above and move them to correct the AI clustering.
        </p>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <select class="sort-select" style="flex:1;max-width:260px;">
            <option>Select target album…</option>
            <option>Rahul</option>
            <option>Mom</option>
            <option>Dad</option>
            <option>Unknown</option>
          </select>
          <button class="btn btn-outline btn-sm">Move Selected Photos</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SELECTION BAR -->
  <div class="selection-bar" id="selectionBar">
    <div class="sel-count" id="selCount">0 selected</div>
    <div class="sel-actions">
      <button class="btn btn-secondary btn-sm" onclick="clearSelection()">✕ Deselect</button>
      <button class="btn btn-primary btn-sm">📤 Move to Album</button>
      <button class="btn btn-danger btn-sm">🗑 Remove</button>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="navLightbox(-1)">‹</button>
    <div class="lb-img" id="lbContent">🖼️</div>
    <button class="lb-nav lb-next" onclick="navLightbox(1)">›</button>
    <div class="lb-info" id="lbInfo"></div>
  </div>

  <script>
    const EMOJIS = ['🖼️','📷','🎞️','🌄','🌅','🌃','🏙️','🌇'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun'];
    const photos = Array.from({length:125}, (_, i) => ({
      id: i+1,
      emoji: EMOJIS[i % EMOJIS.length],
      date: `${MONTHS[i%6]} ${Math.ceil(i/20)+1}, 2026`,
      confidence: (85 + Math.random()*15).toFixed(1),
      selected: false,
    }));

    let currentLbIdx = 0;

    function renderGrid() {
      document.getElementById('photoGrid').innerHTML = photos.map((p,i) => `
        <div class="photo-cell ${p.selected?'selected':''}" id="pc-${i}" onclick="toggleSelect(${i},event)">
          <div class="check">✓</div>
          <span style="font-size:2.5rem">${p.emoji}</span>
          <span class="photo-date">${p.date}</span>
        </div>`).join('');
    }

    function toggleSelect(i, e) {
      if (e.detail === 2) { openLightbox(i); return; } // double-click → lightbox
      photos[i].selected = !photos[i].selected;
      const cell = document.getElementById('pc-' + i);
      cell.classList.toggle('selected', photos[i].selected);
      cell.querySelector('.check').style.display = photos[i].selected ? 'flex' : 'none';
      updateSelectionBar();
    }

    function updateSelectionBar() {
      const sel = photos.filter(p => p.selected).length;
      document.getElementById('selCount').textContent = sel + ' selected';
      document.getElementById('selectionBar').classList.toggle('visible', sel > 0);
    }

    function clearSelection() {
      photos.forEach(p => p.selected = false);
      renderGrid(); updateSelectionBar();
    }

    function toggleSelectAll() {
      const allSel = photos.every(p => p.selected);
      photos.forEach(p => p.selected = !allSel);
      document.getElementById('selAllBtn').textContent = allSel ? '☐ Select All' : '☑ Deselect All';
      renderGrid(); updateSelectionBar();
    }

    function openLightbox(i) {
      currentLbIdx = i;
      document.getElementById('lbContent').textContent = photos[i].emoji;
      document.getElementById('lbInfo').textContent = `Photo ${i+1} of ${photos.length} · ${photos[i].date} · ${photos[i].confidence}% confidence`;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function navLightbox(dir) { currentLbIdx = (currentLbIdx + dir + photos.length) % photos.length; openLightbox(currentLbIdx); }

    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('open')) {
        if (e.key === 'ArrowRight') navLightbox(1);
        if (e.key === 'ArrowLeft') navLightbox(-1);
        if (e.key === 'Escape') closeLightbox();
      }
    });

    function toggleRename() { document.getElementById('renameRow').style.display = 'flex'; document.getElementById('editBtn').style.display = 'none'; }
    function cancelRename() { document.getElementById('renameRow').style.display = 'none'; document.getElementById('editBtn').style.display = ''; }
    function saveName() {
      const n = document.getElementById('nameInput').value.trim();
      if (n) { document.getElementById('personName').textContent = n; document.title = n + ' – Album Detail · FaceVault'; }
      cancelRename();
    }
    function downloadBucket() { alert('⬇️ Generating ZIP archive for Karthik…\n\nThis would trigger a backend download in the full app.'); }
    function openMerge() { alert('🔀 Merge with another album feature\n\nSelect a target album to combine Karthik's photos with another person.'); }
    function rerunClustering() { if (confirm('Re-run AI clustering on this album?')) alert('🔄 Clustering job queued. Check dashboard for progress.'); }
    function deleteBucket() { if (confirm('Delete this album? Photos will remain in your library.')) window.location.href = 'results.html'; }
    function sortPhotos(v) { /* in full app: sort photos array and re-render */ }

    renderGrid();
  </script>
</body>
</html>
