<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Albums – FaceVault</title>
  <meta name="description" content="Browse all automatically created person albums in your FaceVault library." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
    .results-title h1 { font-size:2rem; font-weight:800; }
    .results-title p { color:var(--text-secondary); margin-top:4px; }
    .results-controls { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .sort-select { padding:9px 14px; border-radius:8px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); font-size:0.88rem; font-family:inherit; cursor:pointer; }
    .view-toggle { display:flex; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .view-btn { padding:8px 12px; border:none; background:none; color:var(--text-muted); cursor:pointer; font-size:1rem; transition:all 0.2s; }
    .view-btn.active { background:var(--accent); color:#fff; }
    .persons-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; }
    .persons-list { display:flex; flex-direction:column; gap:12px; }
    .person-card-grid { border-radius:var(--radius); overflow:hidden; cursor:pointer; border:1px solid var(--border); transition:all 0.3s; background:var(--bg-card); }
    .person-card-grid:hover { transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.4); border-color:var(--border-accent); }
    .cover-area { height:190px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:5rem; }
    .cover-area .photo-strip { display:flex; gap:2px; position:absolute; inset:0; }
    .cover-area .photo-strip .strip-img { flex:1; background-size:cover; background-position:center; }
    .cover-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 60%); }
    .cover-badge { position:absolute; top:12px; right:12px; }
    .card-body { padding:16px 18px 18px; }
    .card-person-name { font-size:1rem; font-weight:700; margin-bottom:3px; display:flex; align-items:center; gap:6px; }
    .card-meta-row { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
    .card-count { color:var(--text-secondary); font-size:0.83rem; }
    .card-actions { display:flex; gap:6px; }
    .card-action-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--bg-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.9rem; transition:all 0.2s; }
    .card-action-btn:hover { background:var(--bg-card-hover); border-color:var(--border-accent); }
    .person-list-row { display:flex; align-items:center; gap:16px; padding:16px 20px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:all 0.2s; text-decoration:none; color:var(--text-primary); }
    .person-list-row:hover { border-color:var(--border-accent); background:var(--bg-card-hover); }
    .person-list-avatar { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
    .person-list-info { flex:1; }
    .person-list-name { font-weight:700; font-size:0.95rem; }
    .person-list-sub { color:var(--text-secondary); font-size:0.82rem; margin-top:2px; }
    .empty-state { text-align:center; padding:80px 20px; }
    .empty-icon { font-size:4rem; margin-bottom:16px; }
    .empty-title { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
    .empty-sub { color:var(--text-secondary); margin-bottom:24px; }
    .rename-input { background:none; border:none; border-bottom:1px solid var(--accent); color:var(--text-primary); font-size:1rem; font-weight:700; font-family:inherit; outline:none; width:100%; }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo"><div class="logo-icon">🔍</div>FaceVault</a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="upload.html" class="nav-link">Upload</a>
      <a href="results.html" class="nav-link active">Albums</a>
      <a href="search.html" class="nav-link">Search</a>
      <div class="nav-avatar">K</div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container section">

      <!-- HEADER -->
      <div class="results-header fade-up">
        <div class="results-title">
          <h1>Your Albums <span class="gradient-text" id="albumCountBadge"></span></h1>
          <p>AI-organized by face recognition · Last updated 2 minutes ago</p>
        </div>
        <div class="results-controls">
          <!-- Search -->
          <div class="search-bar" style="min-width:220px;">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search person…" id="searchInput" oninput="filterPersons(this.value)" />
          </div>
          <!-- Sort -->
          <select class="sort-select" onchange="sortPersons(this.value)">
            <option value="count">Most Photos</option>
            <option value="name">Name A–Z</option>
            <option value="recent">Recently Added</option>
          </select>
          <!-- View toggle -->
          <div class="view-toggle">
            <button class="view-btn active" id="gridViewBtn" onclick="setView('grid',this)" title="Grid view">⊞</button>
            <button class="view-btn" id="listViewBtn" onclick="setView('list',this)" title="List view">≡</button>
          </div>
        </div>
      </div>

      <!-- GRID VIEW -->
      <div class="persons-grid fade-up fade-up-1" id="gridView"></div>

      <!-- LIST VIEW -->
      <div class="persons-list" id="listView" style="display:none;"></div>

    </div>
  </div>

  <!-- RENAME MODAL -->
  <div class="modal-overlay" id="renameModal" style="display:none;">
    <div class="modal">
      <div class="modal-title">✏️ Rename Person</div>
      <div class="form-group">
        <label class="form-label">New Name</label>
        <input type="text" class="form-input" id="renameInput" placeholder="Enter person's name" />
      </div>
      <div style="display:flex;gap:12px;margin-top:24px;">
        <button class="btn btn-primary" style="flex:1;" onclick="confirmRename()">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const COLORS = [
      ['#7c3aed','#a855f7'], ['#06b6d4','#0284c7'], ['#ec4899','#f43f5e'],
      ['#10b981','#059669'], ['#f59e0b','#d97706'], ['#8b5cf6','#6d28d9'],
      ['#14b8a6','#0f766e'], ['#ef4444','#dc2626'], ['#f97316','#ea580c'],
      ['#3b82f6','#2563eb'], ['#84cc16','#65a30d'], ['#a855f7','#9333ea'],
    ];

    let persons = [
      { id:1, name:'Karthik',  count:125, emoji:'👤', color:0, unknown:false },
      { id:2, name:'Rahul',    count:98,  emoji:'👤', color:1, unknown:false },
      { id:3, name:'Mom',      count:45,  emoji:'👤', color:2, unknown:false },
      { id:4, name:'Dad',      count:38,  emoji:'👤', color:3, unknown:false },
      { id:5, name:'Priya',    count:31,  emoji:'👤', color:4, unknown:false },
      { id:6, name:'Arjun',    count:22,  emoji:'👤', color:5, unknown:false },
      { id:7, name:'Sneha',    count:18,  emoji:'👤', color:6, unknown:false },
      { id:8, name:'Person_8', count:14,  emoji:'👤', color:7, unknown:false },
      { id:9, name:'Person_9', count:9,   emoji:'👤', color:8, unknown:false },
      { id:10, name:'Unknown', count:12,  emoji:'❓', color:11, unknown:true },
    ];

    let filtered = [...persons];
    let currentView = 'grid';
    let renamingId = null;

    document.getElementById('albumCountBadge').textContent = `(${persons.length})`;

    function renderGrid() {
      document.getElementById('gridView').innerHTML = filtered.map(p => {
        const [c1,c2] = COLORS[p.color % COLORS.length];
        return `
        <div class="person-card-grid" onclick="goToBucket(${p.id})">
          <div class="cover-area" style="background:linear-gradient(135deg,${c1}33,${c2}22)">
            <span style="font-size:4.5rem;">${p.emoji}</span>
            <div class="cover-overlay"></div>
            <div class="cover-badge">
              <span class="badge ${p.unknown ? 'badge-red' : 'badge-purple'}">${p.unknown ? 'Unknown' : 'Identified'}</span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-person-name">
              <span style="width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,${c1},${c2});display:inline-block;"></span>
              ${p.name}
            </div>
            <div class="card-meta-row">
              <div class="card-count">📸 ${p.count} photos</div>
              <div class="card-actions" onclick="event.stopPropagation()">
                <button class="card-action-btn" onclick="openRename(${p.id},'${p.name}')" title="Rename">✏️</button>
                <button class="card-action-btn" title="Download">📥</button>
                <button class="card-action-btn" onclick="deletePerson(${p.id})" title="Delete" style="color:var(--danger)">🗑</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('') || emptyState();
    }

    function renderList() {
      document.getElementById('listView').innerHTML = filtered.map(p => {
        const [c1,c2] = COLORS[p.color % COLORS.length];
        return `
        <a class="person-list-row" href="bucket-detail.html">
          <div class="person-list-avatar" style="background:linear-gradient(135deg,${c1},${c2})">${p.emoji}</div>
          <div class="person-list-info">
            <div class="person-list-name">${p.name}</div>
            <div class="person-list-sub">${p.count} photos · ${p.unknown ? 'Unidentified' : 'Identified'}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;" onclick="event.stopPropagation()">
            <button class="card-action-btn" onclick="openRename(${p.id},'${p.name}')">✏️</button>
            <button class="card-action-btn">📥</button>
            <a href="bucket-detail.html" class="btn btn-outline btn-sm">View →</a>
          </div>
        </a>`;
      }).join('') || emptyState();
    }

    function emptyState() {
      return `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No albums found</div>
        <div class="empty-sub">Try a different search term</div>
      </div>`;
    }

    function render() { renderGrid(); renderList(); }
    function setView(view, btn) {
      currentView = view;
      document.getElementById('gridView').style.display = view === 'grid' ? 'grid' : 'none';
      document.getElementById('listView').style.display = view === 'list' ? 'flex' : 'none';
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function filterPersons(q) {
      filtered = persons.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
      render();
    }
    function sortPersons(by) {
      if (by === 'count') filtered.sort((a,b) => b.count - a.count);
      if (by === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
      render();
    }
    function goToBucket(id) { window.location.href = 'bucket-detail.html'; }
    function openRename(id, name) {
      renamingId = id;
      document.getElementById('renameInput').value = name;
      document.getElementById('renameModal').style.display = 'flex';
      setTimeout(() => document.getElementById('renameInput').focus(), 50);
    }
    function closeModal() { document.getElementById('renameModal').style.display = 'none'; renamingId = null; }
    function confirmRename() {
      const name = document.getElementById('renameInput').value.trim();
      if (!name || !renamingId) return;
      const p = persons.find(x => x.id === renamingId);
      if (p) { p.name = name; filtered = [...persons]; render(); }
      closeModal();
    }
    function deletePerson(id) {
      if (!confirm('Delete this album? Photos will remain in your library.')) return;
      persons = persons.filter(p => p.id !== id);
      filtered = filtered.filter(p => p.id !== id);
      document.getElementById('albumCountBadge').textContent = `(${persons.length})`;
      render();
    }
    document.getElementById('renameModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('renameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') confirmRename(); });

    render();
  </script>
</body>
</html>
