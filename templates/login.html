{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 glass-card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold">Welcome Back</h2>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control rounded-pill px-4 py-2" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control rounded-pill px-4 py-2" id="password" name="password" required>
                    </div>
                    <div class="mb-3 form-check ms-2">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mt-3">Login</button>
                </form>
                <div class="text-center mt-4">
                    <p>Don't have an account? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
